name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: spectral-macos-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: spectral-macos-x64
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: spectral-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: spectral-linux-arm64
          - target: bun-windows-x64
            os: ubuntu-latest
            artifact: spectral-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        run: |
          bun build --compile --minify \
            --define 'IS_BUN_COMPILE=true' \
            --target=${{ matrix.target }} \
            ./src/server/index.ts \
            --outfile dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun run build:ext

      - name: Package VSIX
        run: cd src/extension && npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: spectral-extension.vsix
          path: src/extension/*.vsix

  create-release:
    needs: [build-binaries, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*
